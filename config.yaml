# RTS: Agentic Moneybot System Elite — Configuration
# Secrets moved to .env file (see .env.example)

# Trading Parameters
trading:
  max_risk_per_trade: 0.02
  max_drawdown: 0.10
  max_margin_usage: 0.80
  min_win_rate_live: 0.55
  min_win_rate_paper: 0.45
  base_lot_size: 0.01
  max_positions: 10  # Increased for multi-asset
  slippage_pips: 0.5
  commission_per_lot: 7.0
  # Asset class specific settings
  asset_classes:
    forex:
      max_positions: 5
      slippage_pips: 0.5
    crypto:
      max_positions: 3
      slippage_pips: 5.0  # Higher for crypto
    indices:
      max_positions: 3
      slippage_pips: 1.0
    commodities:
      max_positions: 2
      slippage_pips: 1.5

# AI Brain (PPO Regime-Specialist System - ACTIVE)
ai:
  algorithm: "PPO-Regime-Specialist"
  device: "auto"
  # PPO Regime-Specialist Settings
  regime_agents:
    trending:
      hidden_dims: [1024, 512, 256]
      sl_atr_mult: 2.0
      tp_atr_mult: 4.0
      position_multiplier: 1.0
      learning_rate: 3.0e-4
      clip_range: 0.3
    ranging:
      hidden_dims: [512, 256, 128]
      sl_atr_mult: 1.5
      tp_atr_mult: 3.0
      position_multiplier: 1.0
      learning_rate: 3.0e-4
      clip_range: 0.15
    volatile:
      hidden_dims: [512, 256, 128]
      sl_atr_mult: 2.5
      tp_atr_mult: 5.0
      position_multiplier: 0.5
      learning_rate: 1.0e-4
      clip_range: 0.1
    crisis:
      hidden_dims: [256, 128, 64]
      sl_atr_mult: 1.0
      tp_atr_mult: 2.0
      position_multiplier: 0.0
      learning_rate: 5.0e-5
      clip_range: 0.05
  # Model Versioning
  model_versioning:
    enabled: true
    registry_path: "models/registry"
    auto_promote: true
    promotion_threshold: 0.05
    max_versions: 10
  # Ensemble Settings
  ensemble:
    method: "moe"  # moe (mixture-of-experts) or voting
    experts: ["ppo_regime", "lstm_cnn", "rule_based"]
    elo_rating: true
    sharpe_weighting: true
  # Training
  training:
    total_timesteps: 1000000
    batch_size: 64
    n_epochs: 10
    learning_rate: 3.0e-4
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.2
    ent_coef: 0.01
    vf_coef: 0.5
    max_grad_norm: 0.5
    online_finetune: true
    finetune_freq: 100

# Features
features:
  timeframes:
    - "15m"
    - "1h"
    - "4h"
  lookback: 30

# Risk Management
risk:
  kelly_fraction: 0.25
  confidence_multiplier: true
  volatility_adjustment: true
  sl_atr_multiplier: 2.0
  tp_atr_multiplier: 4.0
  trailing_activation_rr: 1.0
  trailing_distance_rr: 0.5
  max_consecutive_losses: 5
  max_daily_loss: 0.05
  max_position_hold_time: 86400
  var_confidence: 0.95
  var_lookback_days: 60

# Dashboard
dashboard:
  host: "0.0.0.0"
  port: 8000
  websocket_ping_interval: 20
  websocket_ping_timeout: 20
  update_interval_ms: 1000

# Data
data:
  historical_path: "data/historical"
  models_path: "models"
  logs_path: "data/logs"
  trades_path: "data/trades"

# Logging
logging:
  level: "INFO"
  format: "{time:YYYY-MM-DD HH:mm:ss} | {level} | {message}"
  rotation: "100 MB"
  retention: "30 days"
