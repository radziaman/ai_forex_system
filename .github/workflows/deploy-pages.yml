name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Prepare dashboard for GitHub Pages
        run: |
          echo "Preparing dashboard for GitHub Pages..."
          
          # Create _config.yml for Jekyll (disable if not needed)
          echo "" > _config.yml
          
          # Copy dashboard.html to index.html for root access
          cp dashboard.html index.html
          
          # Create 404 page that redirects to main dashboard
          cat > 404.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
              <meta http-equiv="refresh" content="0;url=/ai_forex_system/">
          </head>
          <body>
              <p>Redirecting to dashboard...</p>
          </body>
          </html>
          EOF
          
          # List files for debugging
          echo "Files in repository:"
          ls -la
          echo "---"
          echo "Dashboard HTML size:"
          wc -l dashboard.html index.html
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
        id: pages_url
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages
      
      - name: Output deployment URL
        run: |
          echo "Dashboard deployed to: ${{ steps.deployment.outputs.page_url }}"