name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: '3.9'

jobs:
  # ── Job 1: Lint ──────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install lint dependencies
        run: pip install flake8 black mypy

      - name: Lint with flake8
        run: >
          flake8 .
          --count --select=E9,F63,F7,F82
          --show-source --statistics
          --exclude=.venv,venv,build,dist

      - name: Check formatting with black
        run: black --check .

  # ── Job 2: Type Check ───────────────────────────────────────────────
  type-check:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install type-check dependencies
        run: >
          pip install mypy numpy pandas scikit-learn
          matplotlib seaborn ta-lib yfinance tensorflow torch
          requests aiohttp transformers hmmlearn joblib loguru

      - name: Run mypy
        run: mypy src/ tests/

  # ── Job 3: Test ──────────────────────────────────────────────────────
  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Run tests
        run: >
          pytest tests/ -v
          -W ignore::urllib3.exceptions.NotOpenSSLWarning
          --timeout=120

  # ── Job 4: Health Check ──────────────────────────────────────────────
  health-check:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Run health check
        run: python health_check.py

  # ── Job 5: Diagnostics (main branch push only) ───────────────────────
  diagnostics:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Run AI diagnostics
        run: python src/agentic/_diagnose_ai.py
