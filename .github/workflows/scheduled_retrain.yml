name: Weekly Model Retraining

on:
  schedule:
    - cron: '0 2 * * 0'  # Every Sunday at 2 AM UTC
  workflow_dispatch:  # Allow manual trigger

env:
  PYTHON_VERSION: '3.9'

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Retrain models
        run: >
          python -m src.scripts.train_all_models
          --skip-meta --skip-norm
          --lstm-epochs 50 --ppo-timesteps 2000

      - name: Verify after retraining
        run: python health_check.py

      - name: Commit updated models
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add models/
          git commit -m "chore: weekly model retraining [skip ci]" || echo "No changes"
          git push || echo "Push skipped (no changes or permission)"
