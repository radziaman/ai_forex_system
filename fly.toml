# fly.toml — RTS: AI Moneybot System Elite
# Generated by OpenCode. Deploy with: fly deploy

app = "rts-ai-forex"

kill_signal = "SIGINT"
kill_timeout = "30s"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "60s"
    method = "get"
    path = "/api/data"

  [[http_service.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[http_service.ports]]
    handlers = ["http"]
    port = 80

[mounts]
  source = "rts_data"
  destination = "/app/data"

[mounts]
  source = "rts_models"
  destination = "/app/models"

[env]
  DASHBOARD_PORT = "8000"
  TF_CPP_MIN_LOG_LEVEL = "3"
  TF_ENABLE_ONEDNN_OPTS = "0"

[[vm]]
  memory = "4gb"
  cpu_kind = "performance"
  cpus = 2
